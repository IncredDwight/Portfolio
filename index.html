<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaroslav's Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

header p {
    color: #aaa;
    font-size: 1.1rem;
}

#projects {
    width: min(1400px, 95%);
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 24px;
    padding-bottom: 60px;
}

.project-card {
    background: #1b1b1b;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease;
    border: 1px solid #2c2c2c;
}

.project-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
}

.browser-bar {
    background: #2a2a2a;
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.dot.red {
    background: #ff5f56;
}

.dot.yellow {
    background: #ffbd2e;
}

.dot.green {
    background: #27c93f;
}

.project-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
}

.project-content {
    padding: 20px;
}

.project-content h2 {
    margin-bottom: 10px;
}

.project-content p {
    color: #bbb;
    line-height: 1.5;
    margin-bottom: 16px;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: #2a2a2a;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 0.85rem;
}
</style>
</head>
<body>

<header>
    <h1>Yaroslav's Portfolio</h1>
    <p>Projects built with JavaScript, Node.js, Socket.IO, Three.js and more.</p>
</header>

<section id="projects"></section>

<script>
const projects = [
    {
        title: "Even Quad",
        description: "Real-time multiplayer pattern recognition game.",
        image: "images/EvenQuads.png",
        url: "https://even-quad.onrender.com",
        tags: ["JavaScript", "Node.js", "Socket.IO"]
    },
    {
        title: "2-Qubit visualization",
        description: "Interactive geometry visualization tool.",
        image: "images/3DQudit.png",
        url: "https://quantum.bard.edu/yv/3DVisualization",
        tags: ["Three.js", "Geometry", "WebGL"]
    },
    {
        title: "Qutrit visualization",
        description: "Interactive geometry visualization tool.",
        image: "images/2DQudit.png",
        url: "https://quantum.bard.edu/yv/2DVisualization",
        tags: ["Three.js", "Geometry", "WebGL"]
    }
];

// ---------- RENDER ----------

const container = document.getElementById("projects");

projects.forEach(project => {
    const card = document.createElement("div");
    card.className = "project-card";

    card.innerHTML = `
        <div class="browser-bar">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>

        <img
            class="project-image"
            src="${project.image}"
            alt="${project.title}"
        >

        <div class="project-content">
            <h2>${project.title}</h2>
            <p>${project.description}</p>

            <div class="tags">
                ${project.tags.map(tag =>
                    `<span class="tag">${tag}</span>`
                ).join("")}
            </div>
        </div>
    `;

    card.addEventListener("click", () => {
        window.open(project.url, "_blank");
    });

    container.appendChild(card);
});
</script>

</body>
</html>
